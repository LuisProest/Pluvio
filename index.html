<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Pluviometria" />
<meta name="theme-color" content="#1E73B8" />
<title>PROEST Pluviometria</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#FBF8F2; --card:#ffffff; --line:#E7E0D2; --line2:#D9D1BF;
    --ink:#0c2236; --ink2:#4A5C6B; --ink3:#8294A2;
    --rain:#1E73B8; --rain-d:#0E4C82; --rain-50:#EAF4FB; --rain-200:#A9D3EE; --rain-400:#4BA3DC; --rain-900:#0B3F6E;
    --amber:#D9821F; --amber-bg:#FAEEDA; --amber-ink:#7A4708;
    --soja:#4F9326; --nodata:#ECE7DA; --proest:#ED6A0C;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0a1622; --card:#13263d; --line:#22405e; --line2:#2c4a68;
      --ink:#f2f7fc; --ink2:#b3c6d8; --ink3:#7e96ac; --rain-50:#16364f; --nodata:#1d3349; --proest:#FF8A2E; }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-feature-settings:"tnum" 1;font-size:17px;-webkit-text-size-adjust:100%}
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
  #top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px;gap:10px}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--rain-50);color:var(--rain-d);font-size:16px;font-weight:600;padding:11px 16px;border-radius:24px;border:none;cursor:pointer;max-width:74vw;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .topbtn{background:var(--rain-50);border:none;color:var(--rain-d);width:46px;height:46px;border-radius:50%;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #screen{flex:1;padding:4px 16px 104px;overflow-y:auto;overflow-x:hidden}
  h2.t{font-size:25px;font-weight:600;margin:8px 0 3px;color:var(--ink)}
  .sub{font-size:15px;color:var(--ink2);margin:0 0 14px}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px}
  .row{display:flex;gap:11px}
  .mcard{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:13px 14px;text-align:center}
  .mlab{font-size:13px;color:var(--ink2);font-weight:500}
  .mval{font-size:27px;font-weight:700;color:var(--ink);line-height:1.1;margin-top:3px}
  .msub{font-size:13px;color:var(--ink3);margin-top:1px}
  .hero{background:var(--rain);border-radius:22px;padding:20px}
  .hero .lab{font-size:15px;color:#cfe6fa;font-weight:500}
  .hero .big{font-size:58px;font-weight:700;line-height:1;color:#fff;margin:2px 0 4px}
  .hero .big span{font-size:22px;font-weight:600;color:#cfe6fa}
  .hero .meta{font-size:16px;color:#eaf4fb;font-weight:500}
  .bigbtn{display:flex;align-items:center;gap:14px;width:100%;border:none;border-radius:18px;padding:20px 18px;font-size:19px;font-weight:600;cursor:pointer;margin-top:12px;text-align:left;color:#fff;background:var(--rain)}
  .bigbtn.sec{background:var(--card);color:var(--ink);border:1.5px solid var(--line2)}
  .bigbtn .bi{font-size:30px;width:34px;text-align:center;font-style:normal}
  .bigbtn .d{font-size:14px;font-weight:500;opacity:.92}
  .bigbtn.sec .d{color:var(--ink2);opacity:1}
  .listbtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:18px 16px;font-size:18px;color:var(--ink);cursor:pointer;text-align:left;margin-bottom:12px;font-weight:600}
  .listbtn .bi{font-size:28px;color:var(--rain);font-style:normal;width:32px;text-align:center}
  .listbtn .d{font-size:14px;color:var(--ink2);font-weight:500}
  .note{display:flex;gap:10px;align-items:center;background:var(--rain-50);color:var(--rain-d);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:500;margin-top:6px}
  .note.amber{background:var(--amber-bg);color:var(--amber-ink)}
  .note .bi{font-size:22px;font-style:normal}
  .seg{display:flex;background:var(--card);border:1.5px solid var(--line);border-radius:15px;padding:4px;gap:4px;margin-bottom:14px}
  .seg button{flex:1;border:none;background:none;color:var(--ink2);font-size:16px;font-weight:600;padding:12px;border-radius:11px;cursor:pointer}
  .seg button.on{background:var(--rain);color:#fff}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;font-size:14px;color:var(--ink2)}
  .legend span{display:flex;align-items:center;gap:6px}
  .sw{width:16px;height:16px;border-radius:4px;display:inline-block}
  /* calendário mensal */
  .calnav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .calnav .arrow{background:var(--card);border:1.5px solid var(--line2);color:var(--ink);width:48px;height:48px;border-radius:14px;font-size:26px;cursor:pointer;flex:none}
  .calnav .mtitle{flex:1;text-align:center;font-size:21px;font-weight:700;color:var(--ink);background:none;border:none;cursor:pointer;padding:6px}
  .wk{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-bottom:6px}
  .wk span{text-align:center;font-size:13px;font-weight:600;color:var(--ink3)}
  .cgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
  .day{position:relative;aspect-ratio:1/1;min-height:46px;min-width:0;overflow:hidden;border:1.5px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:15px 2px 3px}
  .day .dn{position:absolute;top:4px;left:6px;font-size:12px;font-weight:600;color:var(--ink3);line-height:1}
  .day .dv{font-size:17px;font-weight:700;line-height:1;max-width:100%;overflow:hidden;white-space:nowrap;padding:0 2px}
  .day .dv0{font-size:15px;font-weight:600;color:var(--ink3)}
  .day .bar{position:absolute;left:0;right:0;bottom:0;height:5px}
  .day.empty{visibility:hidden}
  .day.today{box-shadow:0 0 0 3px var(--rain-d);border-color:var(--rain-d)}
  .monthgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
  .mtile{border:1.5px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;background:var(--card)}
  .mtile .mn{font-size:15px;font-weight:600;color:var(--ink2)}
  .mtile .mt{font-size:25px;font-weight:700;color:var(--ink);margin-top:4px}
  .mtile .ms{font-size:13px;color:var(--ink3)}
  /* propriedades */
  .gaugerow{display:flex;align-items:center;gap:12px;padding:16px 14px;border-radius:14px;border:1.5px solid var(--line);margin-bottom:10px;cursor:pointer;background:var(--bg)}
  .gaugerow.on{border-color:var(--rain);background:var(--rain-50)}
  .gaugerow .gn{flex:1;font-size:17px;font-weight:600;color:var(--ink)}
  .gaugerow .mini{font-size:13px;color:var(--ink3);font-weight:500}
  .tinybtn{background:none;border:none;color:var(--ink2);font-size:23px;cursor:pointer;padding:6px 8px}
  .empty{text-align:center;color:var(--ink3);font-size:16px;padding:40px 14px;line-height:1.5}
  /* tabs */
  #tabs{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;height:74px;background:var(--card);border-top:1.5px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding-bottom:env(safe-area-inset-bottom)}
  #tabs button{background:none;border:none;color:var(--ink3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;font-size:26px}
  #tabs button .lab{font-size:12px;font-weight:600}
  #tabs button.on{color:var(--rain)}
  .fab{width:62px;height:62px;border-radius:50%;background:var(--rain);color:#fff!important;display:flex;align-items:center;justify-content:center;margin-top:-26px;border:5px solid var(--bg)!important;font-size:34px}
  /* sheet/teclado */
  #sheet{position:fixed;inset:0;background:rgba(8,20,32,.5);display:none;align-items:flex-end;z-index:50}
  #sheet.open{display:flex}
  .sheetbox{background:var(--bg);width:100%;max-width:480px;margin:0 auto;border-radius:26px 26px 0 0;padding:14px 16px calc(20px + env(safe-area-inset-bottom));}
  .sheethead{display:flex;justify-content:space-between;align-items:center}
  .sheethead .gname{font-size:16px;color:var(--ink2);font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .closebtn{background:var(--card);border:1.5px solid var(--line2);color:var(--ink);width:42px;height:42px;border-radius:50%;font-size:22px;cursor:pointer;flex:none}
  .datenav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:10px 0}
  .datenav .arrow{background:var(--card);border:1.5px solid var(--line2);color:var(--ink);width:52px;height:52px;border-radius:15px;font-size:28px;cursor:pointer;flex:none}
  .datenav .d{flex:1;text-align:center;font-size:21px;font-weight:700;color:var(--ink)}
  .disp{text-align:center;margin:6px 0 14px}
  .disp .n{font-size:62px;font-weight:700;color:var(--ink)}
  .disp .u{font-size:22px;color:var(--ink3);font-weight:600}
  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{height:64px;background:var(--card);border:1.5px solid var(--line2);border-radius:15px;font-size:30px;font-weight:600;color:var(--ink);cursor:pointer}
  .key:active{background:var(--rain-50)}
  .acts{display:flex;gap:10px;margin-top:13px}
  .btn-sun{flex:1;height:62px;border:1.5px solid #E9C77E;background:var(--amber-bg);color:var(--amber-ink);border-radius:16px;font-size:17px;font-weight:700;cursor:pointer}
  .btn-ok{flex:1.3;height:62px;border:none;background:var(--rain);color:#fff;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:15px;padding:13px 20px;border-radius:26px;display:flex;gap:16px;align-items:center;z-index:60;opacity:0;transition:opacity .2s;pointer-events:none;font-weight:500}
  .toast.show{opacity:1;pointer-events:auto}
  .toast button{background:none;border:none;color:#8fc8ff;font-weight:700;cursor:pointer;font-size:15px}
  #auth{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:80}
  .authbox{width:100%;max-width:380px}
  .authlogo{text-align:center;margin-bottom:10px}
  .authlogo .t{font-size:25px;font-weight:700;color:var(--rain)}
  .authlogo .s{font-size:15px;color:var(--ink2);margin-top:2px}
  .authbox input{width:100%;height:54px;border:1.5px solid var(--line2);border-radius:14px;padding:0 14px;font-size:17px;background:var(--card);color:var(--ink);margin-top:12px}
  .authbox button.primary{width:100%;height:56px;border:none;border-radius:14px;background:var(--rain);color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin-top:16px}
  .authbox .link{text-align:center;margin-top:18px;font-size:15px;color:var(--rain-d);cursor:pointer;font-weight:600}
  .authbox .err{color:#c0392b;font-size:14px;margin-top:12px;text-align:center;min-height:18px;font-weight:500}
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <button class="pill" id="stationPill" onclick="go('props')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 21s-7-6.7-7-12a7 7 0 0114 0c0 5.3-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg><span id="stationName">—</span><span style="opacity:.6">▾</span></button>
    <div style="display:flex;align-items:center;gap:10px"><span id="syncDot" style="font-size:18px;color:var(--ink3)" aria-hidden="true"></span><button class="topbtn" onclick="go('menu')" aria-label="Menu">≡</button></div>
  </div>
  <div id="screen"></div>
  <div id="tabs"></div>
</div>
<div id="auth"></div>
<div id="sheet"><div class="sheetbox" id="sheetbox"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESA=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MESU=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const WK=[['D','dom'],['S','seg'],['T','ter'],['Q','qua'],['Q','qui'],['S','sex'],['S','sáb']];

/* ===== dados: Propriedade -> pluviômetros -> leitura diária ===== */
let farms=[], sel={farm:null,gauge:null}, readings={};
function uid(p){ return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function pad(n){return (n<10?'0':'')+n;}
function iso(y,m,d){return y+'-'+pad(m)+'-'+pad(d);}
function dim(y,m){return [31,(y%4===0&&(y%100!==0||y%400===0))?29:28,31,30,31,30,31,31,30,31,30,31][m-1];}
function today(){const n=new Date();return {y:n.getFullYear(),m:n.getMonth()+1,d:n.getDate()};}
function num(n){ return (Math.round(n*10)/10).toLocaleString('pt-BR'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function saveLocal(){ try{ localStorage.setItem('pp.v2.farms',JSON.stringify(farms)); localStorage.setItem('pp.v2.sel',JSON.stringify(sel)); localStorage.setItem('pp.v2.readings',JSON.stringify(readings)); }catch(e){} }
function persist(){ saveLocal(); scheduleSync(); }
function loadLS(){ try{ farms=JSON.parse(localStorage.getItem('pp.v2.farms')||'[]'); sel=JSON.parse(localStorage.getItem('pp.v2.sel')||'{}'); readings=JSON.parse(localStorage.getItem('pp.v2.readings')||'{}'); }catch(e){ farms=[];sel={};readings={}; } }
function seed(){ loadLS(); if(!farms.length){ const g={id:uid('g'),nome:'Pluviômetro principal'}; farms=[{id:uid('f'),nome:'Minha propriedade',gauges:[g]}]; sel={farm:farms[0].id,gauge:g.id}; readings[g.id]={}; persist(); } if(!findGauge(sel.gauge)) selectFirst(); }
function findFarm(id){ return farms.find(f=>f.id===id); }
function findGauge(id){ for(const f of farms){ const g=(f.gauges||[]).find(x=>x.id===id); if(g) return {farm:f,gauge:g}; } return null; }
function selectFirst(){ for(const f of farms){ if(f.gauges&&f.gauges.length){ sel={farm:f.id,gauge:f.gauges[0].id}; persist(); return; } } }
function curFarm(){ const r=findGauge(sel.gauge); return r?r.farm:null; }
function curGauge(){ const r=findGauge(sel.gauge); return r?r.gauge:null; }
function R(){ if(!readings[sel.gauge]) readings[sel.gauge]={}; return readings[sel.gauge]; }

/* ===== cálculos (somente dados do cliente) ===== */
function rd(y,m,d){ const v=R()[iso(y,m,d)]; return v===undefined?undefined:v; }
function hasDaily(y,m){ for(let d=1;d<=dim(y,m);d++){ if(rd(y,m,d)!==undefined) return true; } return false; }
function monthAgg(y,m){ let s=0,dias=0,med=0; for(let d=1;d<=dim(y,m);d++){ const v=rd(y,m,d); if(v!==undefined){med++; s+=v; if(v>0)dias++;} } return {total:med?Math.round(s*10)/10:null,dias:dias,med:med}; }
function monthTotal(y,m){ return monthAgg(y,m).total; }
function yearAgg(y){ let s=0,dias=0,has=false; for(let m=1;m<=12;m++){ const a=monthAgg(y,m); if(a.total!=null){s+=a.total;dias+=a.dias;has=true;} } return {total:has?Math.round(s*10)/10:null,dias:dias}; }
function yearsWithData(){ const ys=new Set(); for(const k in R()){ ys.add(+k.slice(0,4)); } return Array.from(ys).sort(); }
function latestDataYear(){ const ys=yearsWithData(); return ys.length?ys[ys.length-1]:today().y; }
function clientNormalMonth(m){ let s=0,n=0; for(const y of yearsWithData()){ const t=monthTotal(y,m); if(t!=null){s+=t;n++;} } return n>=2?s/n:null; }
function clientNormalYear(){ let s=0,ok=true; for(let m=1;m<=12;m++){ const v=clientNormalMonth(m); if(v==null){ok=false;break;} s+=v; } return ok?s:null; }
function pendingDays(y,m,upto){ const out=[]; const last=Math.min(upto||dim(y,m),dim(y,m)); for(let d=1;d<=last;d++){ if(rd(y,m,d)===undefined)out.push(d); } return out; }

function cDay(v){ if(v==null)return null; if(v===0)return {bg:'var(--rain-50)',fg:'var(--ink2)'}; if(v<=5)return {bg:'var(--rain-200)',fg:'var(--rain-900)'}; if(v<=15)return {bg:'var(--rain-400)',fg:'#fff'}; if(v<=30)return {bg:'var(--rain)',fg:'#fff'}; return {bg:'var(--rain-900)',fg:'#fff'}; }
function cMon(v){ if(v==null)return 'var(--nodata)'; if(v<=10)return 'var(--rain-50)'; if(v<=60)return 'var(--rain-200)'; if(v<=150)return 'var(--rain-400)'; if(v<=280)return 'var(--rain)'; return 'var(--rain-900)';}
function cellBg(v){ if(v==null)return 'var(--card)'; if(v===0)return 'var(--rain-50)'; if(v<=5)return 'var(--rain-200)'; if(v<=15)return 'var(--rain-400)'; if(v<=30)return 'var(--rain)'; return 'var(--rain-900)';}

/* ===== navegação ===== */
let view='inicio', calY=today().y, calM=today().m, anoYear=today().y, anoMode='ano';
let cursor=today(), kp='', lastAction=null, mpYear=today().y;
const SC=()=>document.getElementById('screen');
function el(html){ SC().innerHTML=html; }
function backbar(target){ return '<button onclick="go(\''+target+'\')" style="background:var(--card);border:1.5px solid var(--line2);color:var(--ink);border-radius:22px;padding:9px 16px;font-size:15px;font-weight:600;cursor:pointer;margin:2px 0 8px">‹ Voltar</button>'; }
function mcard(lab,val,sub){ return '<div class="mcard"><div class="mlab">'+lab+'</div><div class="mval">'+val+'</div>'+(sub?'<div class="msub">'+sub+'</div>':'')+'</div>'; }

/* ===== TELA: Início ===== */
function viewInicio(){
  const t=today(), y=t.y, m=t.m, a=monthAgg(y,m), ya=yearAgg(y);
  el(
    '<h2 class="t">'+MES[m-1]+'</h2><p class="sub">Hoje, '+pad(t.d)+'/'+pad(m)+'/'+y+'</p>'+
    '<div class="hero"><div class="lab">Chuva acumulada no mês</div>'+
      '<div class="big">'+(a.total!=null?num(a.total):'0')+' <span>mm</span></div>'+
      '<div class="meta">'+a.dias+' dia'+(a.dias===1?'':'s')+' com chuva</div></div>'+
    '<button class="bigbtn" onclick="openSheetAt('+y+','+m+','+t.d+')"><span class="bi">＋</span><div>Lançar chuva de hoje<div class="d">Dia '+pad(t.d)+'/'+pad(m)+' · poucos toques</div></div></button>'+
    '<button class="bigbtn sec" onclick="go(\'cal\')"><span class="bi">▦</span><div>Abrir calendário<div class="d">Lançar ou corrigir qualquer dia</div></div></button>'+
    '<div class="row" style="margin-top:18px">'+
      mcard('Total do ano', ya.total!=null?num(ya.total):'0', 'mm em '+y)+
      mcard('Dias com chuva', ya.dias, 'no ano')+
    '</div>'
  );
}

/* ===== TELA: Calendário (mensal, grande, com valores) ===== */
function viewCal(){
  const t=today();
  let g='<div class="calnav"><button class="arrow" onclick="bumpMonth(-1)" aria-label="mês anterior">‹</button>'+
    '<button class="mtitle" onclick="openMonthPicker()">'+MES[calM-1]+' '+calY+' ▾</button>'+
    '<button class="arrow" onclick="bumpMonth(1)" aria-label="próximo mês">›</button></div>';
  if(!(calY===t.y&&calM===t.m)) g+='<div style="text-align:center;margin-bottom:8px"><button class="pill" onclick="calY='+t.y+';calM='+t.m+';viewCal()">↩ Ir para o mês de hoje</button></div>';
  g+='<div class="wk">'+WK.map(w=>'<span title="'+w[1]+'">'+w[0]+'</span>').join('')+'</div>';
  const first=new Date(calY,calM-1,1).getDay(), nd=dim(calY,calM);
  g+='<div class="cgrid">';
  /* dia 1 vai direto para sua coluna (grid-column-start); sem células vazias */
  for(let d=1;d<=nd;d++){
    const v=rd(calY,calM,d);
    const isToday=(calY===t.y&&calM===t.m&&d===t.d);
    const has=(v!==undefined), dark=has&&v>15;
    const bg=cellBg(has?v:null), txt=dark?'#ffffff':'#0B3F6E', dcol=dark?'rgba(255,255,255,.75)':'#5A6B7B';

function renameFarm(id){ const f=findFarm(id); if(!f)return; const n=prompt('Renomear propriedade:',f.nome); if(!n)return; f.nome=n.trim(); persist(); render(); }
function delFarm(id){ const f=findFarm(id); if(!f)return; if(farms.length<=1){ alert('Mantenha ao menos uma propriedade.'); return; } if(!confirm('Excluir a propriedade "'+f.nome+'" e seus pluviômetros?'))return; (f.gauges||[]).forEach(g=>delete readings[g.id]); farms=farms.filter(x=>x.id!==id); if(!findGauge(sel.gauge)) selectFirst(); persist(); render(); }

function delGauge(farmId,gid){ const f=findFarm(farmId); if(!f)return; if((f.gauges||[]).length<=1){ alert('Cada propriedade precisa de ao menos um pluviômetro.'); return; } const r=findGauge(gid); if(!confirm('Excluir o pluviômetro "'+(r?r.gauge.nome:'')+'" e seus lançamentos?'))return; f.gauges=f.gauges.filter(x=>x.id!==gid); delete readings[gid]; if(sel.gauge===gid) selectFirst(); persist(); render(); }
function selectGauge(farmId,gid){ sel={farm:farmId,gauge:gid}; const t=today(); calY=t.y;calM=t.m;anoYear=latestDataYear(); persist(); go('inicio'); }
function gpsGauge(gid){ const r=findGauge(gid); if(!r)return; if(!navigator.geolocation){ alert('GPS não disponível neste aparelho. Toque nas coordenadas para digitar manualmente.'); return; }
  showToast('Obtendo localização do GPS…');
  navigator.geolocation.getCurrentPosition(function(pos){ r.gauge.lat=+pos.coords.latitude.toFixed(6); r.gauge.lng=+pos.coords.longitude.toFixed(6); persist(); render(); showToast('Localização salva: '+r.gauge.lat.toFixed(4)+', '+r.gauge.lng.toFixed(4)); },
    function(err){ alert('Não foi possível obter o GPS ('+err.message+').\nToque nas coordenadas para digitar manualmente.'); }, {enableHighAccuracy:true,timeout:12000,maximumAge:0}); }
function locGauge(gid){ const r=findGauge(gid); if(!r)return; const cur=(r.gauge.lat!=null?r.gauge.lat+', '+r.gauge.lng:''); const s=prompt('Coordenadas (latitude, longitude):',cur); if(s===null)return;
  if(s.trim()===''){ r.gauge.lat=null; r.gauge.lng=null; persist(); render(); return; }
  let parts=s.trim().split(/[;\s]+/); if(parts.length<2) parts=s.split(',');
  const la=parseFloat(String(parts[0]).replace(',','.')), ln=parseFloat(String(parts[1]).replace(',','.'));
  if(isNaN(la)||isNaN(ln)||la<-90||la>90||ln<-180||ln>180){ alert('Coordenadas inválidas. Ex.: -18.331, -52.394'); return; }
  r.gauge.lat=+la.toFixed(6); r.gauge.lng=+ln.toFixed(6); persist(); render(); showToast('Localização salva'); }

    '<textarea id="impText" placeholder="15/01/2024  12,5&#10;16/01/2024  0&#10;17/01/2024  8,5" style="width:100%;height:170px;border:1.5px solid var(--line2);border-radius:14px;padding:12px;font-size:16px;font-family:monospace;background:var(--card);color:var(--ink);resize:vertical"></textarea>'+
    '<button class="bigbtn" style="margin-top:12px" onclick="doImportText()"><span class="bi">⤒</span><div>Importar texto colado</div></button>'+
    '<label class="listbtn" style="cursor:pointer;margin-top:12px"><span class="bi">▤</span><div>Ou enviar arquivo CSV<div class="d">Colunas com data e mm</div></div><input type="file" accept=".csv,.txt,text/csv,text/plain" style="display:none" onchange="doImportFile(event)"></label>'+
    '<div id="impResult" style="margin-top:10px"></div>');
}
function parseRows(text){
  const lines=String(text).split(/\r?\n/); const rows=[]; let ignored=0;
  for(const raw of lines){
    const line=raw.trim(); if(!line) continue;
    let y,mo,d,used=null;
    let m=line.match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
    if(m){ y=+m[1];mo=+m[2];d=+m[3];used=m[0]; }
    else { m=line.match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2,4})/); if(m){ d=+m[1];mo=+m[2];y=+m[3]; if(y<100)y+=2000; used=m[0]; } }
    if(!used){ ignored++; continue; }
    const idx=line.indexOf(used);
    let nm=line.slice(idx+used.length).match(/-?\d+(?:[.,]\d+)?/);
    if(!nm) nm=line.slice(0,idx).match(/-?\d+(?:[.,]\d+)?/);
    if(!nm){ ignored++; continue; }
    const mm=parseFloat(nm[0].replace(',','.'));
    if(isNaN(mm)||mm<0||mo<1||mo>12||d<1||d>31){ ignored++; continue; }
    rows.push({k:iso(y,mo,d),mm:Math.round(mm*10)/10});
  }
  return {rows,ignored};
}
function applyImport(text){
  const r=parseRows(text), box=document.getElementById('impResult');
  if(!r.rows.length){ if(box)box.innerHTML='<div class="note amber"><span class="bi">⚠︎</span><span>Nenhuma linha reconhecida. Confira: cada linha precisa ter uma <b>data</b> e um <b>número (mm)</b>.</span></div>'; return; }
  const map=R(); r.rows.forEach(x=>{ map[x.k]=x.mm; }); anoYear=latestDataYear(); persist();
  const yrs=Array.from(new Set(r.rows.map(x=>x.k.slice(0,4)))).sort();
  if(box)box.innerHTML='<div class="note"><span class="bi">✓</span><span><b>'+r.rows.length+'</b> dia(s) importados'+(r.ignored?' · '+r.ignored+' linha(s) ignoradas':'')+'. Anos: '+yrs.join(', ')+'.</span></div>'+
    '<button class="bigbtn" style="margin-top:10px" onclick="go(\'ano\')"><span class="bi">▥</span><div>Ver na Análise</div></button>';
  showToast(r.rows.length+' dias importados');
}
function doImportText(){ const t=document.getElementById('impText'); applyImport(t?t.value:''); }
function doImportFile(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=function(){ applyImport(String(r.result)); }; r.readAsText(f); }

  const y=cursor.y,m=cursor.m,d=cursor.d, _n=new Date();

  const wd=WK[new Date(y,m-1,d).getDay()][1];

    '<div class="disp"><span class="n" id="kpDisp">'+(kp||'0')+'</span><span class="u"> mm</span></div>'+

      '<button class="key" onclick="kpf(\',\')">,</button><button class="key" onclick="kpf(\'0\')">0</button><button class="key" onclick="kpf(\'del\')" aria-label="apagar">⌫</button></div>'+

function closeSheet(){ document.getElementById('sheet').classList.remove('open'); kp=''; render(); }
function moveDate(delta){ let dt=new Date(cursor.y,cursor.m-1,cursor.d); dt.setDate(dt.getDate()+delta); cursor={y:dt.getFullYear(),m:dt.getMonth()+1,d:dt.getDate()}; const v=rd(cursor.y,cursor.m,cursor.d); kp=(v===undefined||v===0)?'':num(v).replace('.',','); openSheet(); }
function commitVal(v){ const key=iso(cursor.y,cursor.m,cursor.d); lastAction={key:key,gauge:sel.gauge,prev:R()[key]}; R()[key]=v; persist(); }
function kpf(k){
  if(k==='del'){ kp=kp.length>1?kp.slice(0,-1):''; }
  else if(k==='sun'){ commitVal(0); closeSheet(); showToast('Lançado 0 mm (sem chuva) em '+pad(cursor.d)+'/'+pad(cursor.m)); return; }
  else if(k==='ok'){ const v=parseFloat((kp||'0').replace(',','.'))||0; if(v>250&&!confirm('Confirmar '+num(v)+' mm em um dia?'))return; commitVal(v); closeSheet(); showToast('Lançado '+num(v)+' mm em '+pad(cursor.d)+'/'+pad(cursor.m)); return; }
  else if(k===','){ if(kp.indexOf(',')<0) kp=(kp||'0')+','; }
  else { kp=(kp==='0'?'':kp)+k; }
  const e=document.getElementById('kpDisp'); if(e)e.textContent=kp||'0';
}

let toastT=null;

function undo(){ if(!lastAction)return; const r=readings[lastAction.gauge]||{}; if(lastAction.prev===undefined) delete r[lastAction.key]; else r[lastAction.key]=lastAction.prev; persist(); lastAction=null; document.getElementById('toast').classList.remove('show'); render(); }

/* ===== exportação ===== */
function slug(s){ return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Za-z0-9]+/g,'').replace(/^_+|_+$/g,'') || 'Pluviometro'; }
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove(); }
function gradeAOA(year){
  const A=[['Precipitações Pluviométricas'],[ (curFarm()?curFarm().nome:'')+'  ·  '+(curGauge()?curGauge().nome:'')+'   Ano: '+year ],[],['Dia'].concat(MESA)];
  const tot=Array(12).fill(0), has=Array(12).fill(false);
  for(let d=1;d<=31;d++){ const row=[d]; for(let m=1;m<=12;m++){ if(d>dim(year,m)){row.push('');continue;} const v=rd(year,m,d); if(v===undefined){row.push('');} else {row.push(v); tot[m-1]+=v; has[m-1]=true;} } A.push(row); }
  A.push(['Total'].concat(tot.map((t,i)=>has[i]?Math.round(t*10)/10:''))); A.push([]); A.push(['Total do ano:','',Math.round(tot.reduce((a,b)=>a+b,0)*10)/10]);
  return A;
}
function mediasAOA(){ const A=[['PROEST - Consultoria Agrícola'],[curFarm()?curFarm().nome:''],['Pluviômetro: '+(curGauge()?curGauge().nome:'')],[],['Ano'].concat(MESU).concat(['Total'])];
  for(const y of yearsWithData()){ const row=[y]; let s=0,has=false; for(let m=1;m<=12;m++){ const v=monthTotal(y,m); row.push(v==null?'':v); if(v!=null){s+=v;has=true;} } row.push(has?Math.round(s*10)/10:''); A.push(row); } return A; }
function diasAOA(){ const A=[['Número de Dias Com Chuva'],[],['Ano'].concat(MESU)]; for(const y of yearsWithData()){ const row=[y]; for(let m=1;m<=12;m++){ const a=monthAgg(y,m); row.push(a.med>0?a.dias:''); } A.push(row); } return A; }
function exportXLSX(){ const yrs=yearsWithData(); if(!yrs.length){ alert('Este pluviômetro ainda não tem lançamentos para exportar.'); return; }
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(mediasAOA()),'Médias'); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(diasAOA()),'Dias Com Chuva');
  yrs.forEach(y=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(gradeAOA(y)),String(y)));
  XLSX.writeFile(wb,'Pluviometria_'+slug(curFarm()?curFarm().nome:'')+'_'+slug(curGauge()?curGauge().nome:'')+'.xlsx'); showToast('Planilha .xlsx gerada'); }
function exportCSV(){ let s='propriedade,pluviometro,latitude,longitude,data,mm\n'; farms.forEach(f=>(f.gauges||[]).forEach(g=>{ const map=readings[g.id]||{}; const la=(g.lat!=null?g.lat:''), ln=(g.lng!=null?g.lng:''); Object.keys(map).sort().forEach(k=>{ s+='"'+f.nome.replace(/"/g,'""')+'","'+g.nome.replace(/"/g,'""')+'",'+la+','+ln+','+k+','+map[k]+'\n'; }); })); dl(new Blob(['﻿'+s],{type:'text/csv;charset=utf-8'}),'Pluviometria_export.csv'); showToast('CSV gerado'); }
function exportJSON(){ const obj={schema:'proest.pluviometria/v2',exportado_em:new Date().toISOString(),farms:farms,readings:readings}; dl(new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}),'backup_pluviometria.json'); showToast('Backup JSON gerado'); }
function importJSON(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=function(){ try{ const o=JSON.parse(r.result); if(o.farms&&o.readings){
      o.farms.forEach(function(nf){ const ex=findFarm(nf.id);
        if(ex){ ex.nome=nf.nome; (nf.gauges||[]).forEach(function(ng){ const eg=ex.gauges.find(x=>x.id===ng.id); if(eg)Object.assign(eg,ng); else ex.gauges.push(ng); }); }
        else farms.push(nf); });
      for(var _g in o.readings){ readings[_g]=Object.assign(readings[_g]||{}, o.readings[_g]); }
      const last=o.farms[o.farms.length-1]; if(last&&last.gauges&&last.gauges[0]) sel={farm:last.id,gauge:last.gauges[0].id};
      if(!findGauge(sel.gauge))selectFirst(); const _t=today(); calY=_t.y;calM=_t.m; anoYear=latestDataYear(); persist(); showToast('Dados importados (mesclados)'); go('inicio');
    } else alert('Formato não reconhecido.'); }catch(e){ alert('Arquivo inválido'); } }; r.readAsText(f); }

/* ===== roteador / tabs ===== */
const TABS=[['inicio','M3 12l9-9 9 9M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9','Início'],

function ic(p){ return '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="'+p+'"/></svg>'; }

document.getElementById('sheet').addEventListener('click',function(e){ if(e.target.id==='sheet') closeSheet(); });

/* ============ SUPABASE: login + sincronização na nuvem ============ */
const SB_URL='https://xbeuirzpjzphwyrpjofa.supabase.co';
const SB_KEY='sb_publishable_dWXK0aSynrFmX5jWgrf1Ig_twalCQMF';
let sb=null, authUser=null, lastSync=null, syncTimer=null, syncing=false, authMode='login';
function sbInit(){ if(!sb){ if(!window.supabase||!window.supabase.createClient) return null; sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}}); } return sb; }
function setSync(s){ const d=document.getElementById('syncDot'); if(!d)return; if(s==='ok'){d.textContent='☁';d.title='Sincronizado';d.style.color='var(--soja)';} else if(s==='pend'){d.textContent='⟳';d.title='Sincronizando…';d.style.color='var(--amber)';} else {d.textContent='☁';d.title='Offline (dados salvos no aparelho)';d.style.color='var(--ink3)';} }

function flatten(){ const props=[],gauges=[],reads=[]; farms.forEach(function(f){ props.push({id:f.id,nome:f.nome}); (f.gauges||[]).forEach(function(g){ gauges.push({id:g.id,propriedade_id:f.id,nome:g.nome,lat:(g.lat==null?null:g.lat),lng:(g.lng==null?null:g.lng)}); }); }); for(const gid in readings){ const map=readings[gid]||{}; for(const d in map){ reads.push({id:gid+'_'+d,pluviometro_id:gid,data:d,mm:map[d]}); } } return {props,gauges,reads}; }
function idxOf(arr){ const m={}; arr.forEach(function(x){ m[x.id]=JSON.stringify(x); }); return m; }

async function syncPush(){
  if(!authUser||!sbInit()||syncing) return;
  syncing=true; setSync('pend');
  try{
    const cur=flatten(), prev=lastSync||{props:[],gauges:[],reads:[]}, uid=authUser.id;
    const pP=idxOf(prev.props),pG=idxOf(prev.gauges),pR=idxOf(prev.reads), cP=idxOf(cur.props),cG=idxOf(cur.gauges),cR=idxOf(cur.reads);
    const upP=cur.props.filter(x=>cP[x.id]!==pP[x.id]).map(x=>({id:x.id,nome:x.nome,user_id:uid}));
    const upG=cur.gauges.filter(x=>cG[x.id]!==pG[x.id]).map(x=>({id:x.id,propriedade_id:x.propriedade_id,nome:x.nome,lat:x.lat,lng:x.lng,user_id:uid}));
    const upR=cur.reads.filter(x=>cR[x.id]!==pR[x.id]).map(x=>({id:x.id,pluviometro_id:x.pluviometro_id,data:x.data,mm:x.mm,user_id:uid}));
    const sP=new Set(cur.props.map(x=>x.id)),sG=new Set(cur.gauges.map(x=>x.id)),sR=new Set(cur.reads.map(x=>x.id));
    const dP=prev.props.filter(x=>!sP.has(x.id)).map(x=>x.id), dG=prev.gauges.filter(x=>!sG.has(x.id)).map(x=>x.id), dR=prev.reads.filter(x=>!sR.has(x.id)).map(x=>x.id);
    if(dR.length){ const {error}=await sb.from('leituras').delete().in('id',dR); if(error)throw error; }
    if(dG.length){ const {error}=await sb.from('pluviometros').delete().in('id',dG); if(error)throw error; }
    if(dP.length){ const {error}=await sb.from('propriedades').delete().in('id',dP); if(error)throw error; }
    if(upP.length){ const {error}=await sb.from('propriedades').upsert(upP); if(error)throw error; }
    if(upG.length){ const {error}=await sb.from('pluviometros').upsert(upG); if(error)throw error; }
    if(upR.length){ const {error}=await sb.from('leituras').upsert(upR); if(error)throw error; }
    lastSync=cur; setSync('ok');
  }catch(e){ setSync('off'); }
  finally{ syncing=false; }
}
function scheduleSync(){ if(!authUser)return; clearTimeout(syncTimer); setSync('pend'); syncTimer=setTimeout(syncPush,1200); }

async function pullAll(){
  const [p,g,r]=await Promise.all([ sb.from('propriedades').select('*'), sb.from('pluviometros').select('*'), sb.from('leituras').select('*') ]);
  if(p.error||g.error||r.error) throw (p.error||g.error||r.error);
  const fmap={}; farms=[]; readings={};
  (p.data||[]).forEach(function(pr){ const f={id:pr.id,nome:pr.nome,gauges:[]}; fmap[pr.id]=f; farms.push(f); });
  (g.data||[]).forEach(function(gg){ const f=fmap[gg.propriedade_id]; const ga={id:gg.id,nome:gg.nome}; if(gg.lat!=null)ga.lat=gg.lat; if(gg.lng!=null)ga.lng=gg.lng; if(f)f.gauges.push(ga); readings[gg.id]=readings[gg.id]||{}; });
  (r.data||[]).forEach(function(rr){ readings[rr.pluviometro_id]=readings[rr.pluviometro_id]||{}; readings[rr.pluviometro_id][rr.data]=Number(rr.mm); });
  lastSync=flatten();
  return (p.data||[]).length;
}

function mergeInto(lf, lr){
  (lf||[]).forEach(function(f){
    let cf=findFarm(f.id);
    if(!cf){ cf={id:f.id,nome:f.nome,gauges:[]}; farms.push(cf); }
    (f.gauges||[]).forEach(function(g){
      if(!cf.gauges.find(function(x){return x.id===g.id;})){ const cg={id:g.id,nome:g.nome}; if(g.lat!=null)cg.lat=g.lat; if(g.lng!=null)cg.lng=g.lng; cf.gauges.push(cg); readings[g.id]=readings[g.id]||{}; }
    });
  });
  for(const gid in (lr||{})){ readings[gid]=readings[gid]||{}; const m=lr[gid]||{}; for(const d in m){ if(readings[gid][d]===undefined) readings[gid][d]=m[d]; } }
}
async function afterLogin(){
  hideAuth();
  loadLS();
  const localFarms=farms, localReadings=readings;
  const localHasData = localFarms.length>0 && (localFarms.length>1 || (localFarms[0].gauges||[]).length>1 || Object.keys(localReadings).some(function(k){return Object.keys(localReadings[k]||{}).length>0;}));
  const firstOnDevice = (localStorage.getItem('pp.lastUid') !== authUser.id);
  if(!farms.length){ seed(); }
  const t=today(); cursor=t; calY=t.y; calM=t.m; anoYear=t.y;
  render();
  try{
    await pullAll();
    if(firstOnDevice && localHasData){
      mergeInto(localFarms, localReadings);
      if(!findGauge(sel.gauge)) selectFirst();
      saveLocal(); await syncPush(); showToast('Dados deste aparelho enviados para a nuvem');
    } else {
      if(!findGauge(sel.gauge)) selectFirst();
      saveLocal(); setSync('ok');
    }
    localStorage.setItem('pp.lastUid', authUser.id);
    render();
  }catch(e){ setSync('off'); showToast('Sem conexão — usando dados locais'); }
}

function authForm(){
  document.getElementById('auth').innerHTML='<div class="authbox">'

function showLogin(){ document.getElementById('app').style.display='none'; const s=document.getElementById('sheet'); if(s)s.classList.remove('open'); document.getElementById('auth').style.display='flex'; authForm(); }
function hideAuth(){ document.getElementById('auth').style.display='none'; document.getElementById('app').style.display='flex'; }

function authErr(m){ const e=document.getElementById('auErr'); if(e)e.textContent=m||''; }
function traduzErro(m){ m=m||'Erro'; if(/Invalid login/i.test(m))return 'E-mail ou senha incorretos.'; if(/already registered|already exists/i.test(m))return 'E-mail já cadastrado — faça login.'; if(/Email not confirmed/i.test(m))return 'Confirme seu e-mail antes de entrar.'; if(/at least 6/i.test(m))return 'A senha precisa de ao menos 6 caracteres.'; return m; }
async function authSubmit(){
  if(!sbInit()){ authErr('Carregando… tente novamente.'); return; }
  const em=(document.getElementById('auEmail').value||'').trim(), pw=document.getElementById('auPass').value||'';
  if(!em||pw.length<6){ authErr('Informe e-mail e senha (mín. 6 caracteres).'); return; }

    if(authMode==='signup'){

      authUser=data.user; await afterLogin(); return;
    }

}
async function doLogout(){ try{ if(sbInit())await sb.auth.signOut(); }catch(e){} authUser=null; lastSync=null; authMode='login'; showLogin(); }

/* boot */
(async function boot(){
  let tries=0; while(!sbInit() && tries<25){ await new Promise(r=>setTimeout(r,150)); tries++; }
  if(!sbInit()){ showLogin(); return; }
  try{ const {data}=await sb.auth.getSession(); if(data&&data.session&&data.session.user){ authUser=data.session.user; await afterLogin(); } else { showLogin(); } }catch(e){ showLogin(); }
  try{ sb.auth.onAuthStateChange(function(ev){ if(ev==='SIGNED_OUT'){ authUser=null; showLogin(); } }); }catch(e){}
  window.addEventListener('online', function(){ if(authUser) syncPush(); });
})();
